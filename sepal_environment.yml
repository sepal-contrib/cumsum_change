name: cumsum_change
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pyproj
  - gdal=3.8.3
  - tensorflow
  - tensorflow-probability
  - pandas
  - tf-keras
  - sepal-ui>=2.22.1,<3
  - pygaul<0.4  # pin to avoid GAUL 2024 property name mismatch with sepal_ui
  - rasterio<=1.4.3
  - pip
  - pip:
    - git+https://github.com/openforis/earthengine-api.git@v1.1.5rc0#egg=earthengine-api&subdirectory=python
